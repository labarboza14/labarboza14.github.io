backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

locale: "pt"

collections:
  - name: "blog"
    label: "Anotações de campo"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Resumo", name: "excerpt", widget: "text", hint: "Aparece na listagem e no card da home. Máximo 2 frases." }
      - { label: "Data de publicação", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Tag", name: "tag", widget: "string", hint: "ex: código, comunidade, carreira, reflexões" }
      - { label: "Tempo de leitura", name: "readTime", widget: "string", default: "5 min de leitura" }
      - { label: "Imagem de capa (opcional)", name: "image", widget: "image", required: false }
      - { label: "Conteúdo", name: "body", widget: "markdown" }
